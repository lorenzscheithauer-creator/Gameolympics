<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background-color: #f0f2f5; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        form { display: flex; flex-direction: column; width: 300px; }
        input { margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #message { margin-top: 15px; color: red; }
        p { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registrieren</h2>
        <form id="register-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="E-Mail" required>
            <input type="password" id="password" placeholder="Passwort" required>
            <button type="submit">Registrieren</button>
        </form>
        <div id="message"></div>
        <p>Schon einen Account? <a href="login.html">Hier anmelden</a>.</p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
