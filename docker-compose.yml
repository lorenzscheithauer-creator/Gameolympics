services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      # Der Code wird weiterhin synchronisiert
      - ./backend:/app
      # Die Datenbank wird jetzt in das sichere 'gameolympics-data' Volume gespeichert
      - gameolympics-data:/app/data
    # Wir geben dem Container die .env-Datei mit den Geheimnissen
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules

# Hier definieren wir den sicheren Speicherort für die Datenbank
volumes:
  gameolympics-data:
